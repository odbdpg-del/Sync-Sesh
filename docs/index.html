<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sync Sesh Legal</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "Segoe UI", sans-serif;
        background: #0b1220;
        color: #eef6ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top, rgba(72, 214, 255, 0.18), transparent 30%),
          linear-gradient(180deg, #0b1220 0%, #070b14 100%);
      }

      main {
        max-width: 760px;
        margin: 0 auto;
        padding: 56px 20px 72px;
      }

      .card {
        background: rgba(15, 23, 42, 0.88);
        border: 1px solid rgba(72, 214, 255, 0.22);
        border-radius: 18px;
        padding: 28px;
        box-shadow: 0 0 36px rgba(72, 214, 255, 0.12);
      }

      h1,
      h2 {
        margin: 0 0 12px;
        font-family: "Courier New", monospace;
      }

      p,
      li {
        line-height: 1.6;
        color: #d7e6ff;
      }

      ul {
        padding-left: 18px;
      }

      a {
        color: #69ecff;
      }

      .links {
        display: grid;
        gap: 12px;
        margin-top: 24px;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <h1>Sync Sesh Legal</h1>
        <p>Simple legal pages for the Sync Sesh Discord Activity.</p>
        <div class="links">
          <a href="./terms.html">Terms of Service</a>
          <a href="./privacy.html">Privacy Policy</a>
        </div>
      </section>
    </main>
  </body>
</html>
